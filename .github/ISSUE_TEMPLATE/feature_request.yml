name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

  - type: dropdown
    id: utility-class
    attributes:
      label: Utility Class
      description: Which utility class does this feature relate to?
      options:
        - SoapUtil
        - StringUtil
        - FileUtil
        - ArrayUtil
        - ClassUtil
        - LoggerUtil
        - ObjectUtil
        - UrlUtil
        - MethodUtil
        - New utility class
        - Other
    validations:
      required: true

  - type: textarea
    id: solenopsis-use-case
    attributes:
      label: Solenopsis Framework Use Case
      description: |
        How does this feature assist with:
        - Solenopsis Salesforce SOAP operations?
        - Session management?
        - General utility handling?

        **Context**: jcommons is the foundation for the Solenopsis framework.
      placeholder: |
        This feature would help with Solenopsis SOAP client generation by...
        OR
        This improves session caching in Solenopsis Session module by...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem would this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: I think it would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
    validations:
      required: false
