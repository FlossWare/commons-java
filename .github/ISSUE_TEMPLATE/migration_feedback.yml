name: v2.0 Migration Feedback
description: Feedback on deprecated method migration challenges
title: "[v2.0 MIGRATION] "
labels: ["v2.0-migration", "deprecation", "feedback"]
body:
  - type: markdown
    attributes:
      value: |
        ## v2.0 Migration Feedback

        **Context**: jcommons has deprecated methods scheduled for removal in v2.0.

        See [CHANGELOG.md](https://github.com/FlossWare/jcommons/blob/main/CHANGELOG.md) for migration guides.

        This template helps us understand migration challenges and improve our v2.0 transition plan.

  - type: dropdown
    id: deprecated-method
    attributes:
      label: Deprecated Method
      description: Which deprecated method are you having trouble migrating away from?
      options:
        - StringUtil.toString(Serializable)
        - StringUtil.fromString(String)
        - StringUtil.toCompressedString(Serializable)
        - StringUtil.fromCompressedString(String)
        - FileUtil.getFileInputStream(File)
        - FileUtil.getFileInputStream(String)
        - FileUtil.ensureFileExists(File)
        - FileUtil.ensureFileExists(String)
        - StringUtil.ensureString(String)
        - StringUtil.ensureString(String, String)
        - Multiple methods
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: migration-challenge
    attributes:
      label: Migration Challenge
      description: |
        Why are the recommended v2.0 replacements insufficient for your use case?

        **Recommended replacements**:
        - **Serialization**: Jackson/Gson for JSON serialization (replaces StringUtil.toString/fromString)
        - **File I/O**: Files.newInputStream(Path) (replaces FileUtil.getFileInputStream)
        - **Validation**: StringUtil.requireNonBlank() (replaces ensureString)
      placeholder: |
        The recommended replacement (Jackson/Gson) doesn't work because...
        OR
        We rely on this specific behavior that's not available in NIO.2 Path API...
    validations:
      required: true

  - type: dropdown
    id: solenopsis-module
    attributes:
      label: Solenopsis Module Impact
      description: How does v2.0 removal affect your Solenopsis stack?
      options:
        - Solenopsis SOAP (API client generation)
        - Solenopsis Session (authentication/session caching)
        - Both SOAP and Session
        - Not using Solenopsis (direct jcommons usage)
        - Other
    validations:
      required: true

  - type: textarea
    id: timeline-impact
    attributes:
      label: Timeline & Migration Concerns
      description: |
        - What is your migration timeline?
        - When do you plan to upgrade to jcommons v2.0?
        - Are there blocking concerns preventing migration?
      placeholder: |
        We plan to migrate by Q3 2026...
        Blocking concern: Our session caching depends on compressed serialization...
    validations:
      required: false

  - type: textarea
    id: proposed-alternative
    attributes:
      label: Proposed Alternative (Optional)
      description: |
        Do you have suggestions for:
        - Alternative replacement approaches?
        - v2.0 transition strategies?
        - Deprecation timeline adjustments?
      placeholder: |
        Instead of removing completely, could we...
        OR
        A phased approach where v2.0 keeps methods but logs warnings...
    validations:
      required: false

  - type: dropdown
    id: breaking-change-acceptable
    attributes:
      label: Breaking Change Acceptable?
      description: |
        Is a breaking change in v2.0 acceptable if migration path is clear?
      options:
        - "Yes - breaking changes are OK with good migration guide"
        - "No - need backwards compatibility or shim layer"
        - "Depends on timeline and migration effort"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        - Code examples showing current usage
        - Solenopsis integration details
        - Other relevant information
      placeholder: |
        Current code:
        ```java
        String serialized = StringUtil.toCompressedString(sessionCache);
        ```

        This is used in Solenopsis Session module for...
    validations:
      required: false

  - type: checkboxes
    id: acknowledgment
    attributes:
      label: Acknowledgment
      description: Please confirm you understand the v2.0 migration plan
      options:
        - label: I have read the CHANGELOG.md migration guide
          required: true
        - label: I understand v2.0 will remove deprecated methods (per deprecation policy)
          required: true
        - label: I am providing feedback to help improve the migration process
          required: true
