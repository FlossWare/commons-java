name: Question
description: Ask a question about commons-java
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using commons-java? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: How do I...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant code or background information
      placeholder: |
        I'm trying to use StringUtil.concat() in my project...
    validations:
      required: false
