name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Configure SonarCloud for CI analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Disable automatic analysis via SonarCloud API
          # Using the documented Web API endpoint for project settings
          echo "Disabling automatic analysis for CI mode compatibility..."

          # Method 1: Try to disable automatic analysis via settings API
          curl -X POST -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/settings/set" \
            -d "component=FlossWare_commons-java" \
            -d "key=sonar.autoscan" \
            -d "value=false" \
            2>/dev/null || echo "Settings API call completed (may have already been disabled)"

          # Method 2: Update analysis method to CI-based via navigation settings
          curl -X POST -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/navigation/set_analysis_mode" \
            -d "project=FlossWare_commons-java" \
            -d "mode=CI" \
            2>/dev/null || echo "Analysis mode API call completed"

      - name: Build and analyze with SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=FlossWare_commons-java \
            -Dsonar.organization=flossware \
            -Dsonar.scanner.skipJreProvisioning=true \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true
